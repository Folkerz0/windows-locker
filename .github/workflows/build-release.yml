name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Build
      shell: cmd
      run: |
        call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
        cl /O2 /Os /GL /GS- /GR- /EHsc /W3 /nologo /MT /Fe:LockScreen.exe ultra_fast_locker.cpp user32.lib gdi32.lib shell32.lib ole32.lib gdiplus.lib winmm.lib shlwapi.lib uuid.lib
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: LockScreen.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
