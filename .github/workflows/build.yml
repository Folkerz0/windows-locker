name: Build LockScreen

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup MSVC
      uses: microsoft/setup-msbuild@v1.3
      
    - name: Build with MSVC
      shell: cmd
      run: |
        call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
        cl /O2 /Os /GL /GS- /GR- /EHsc /W3 /nologo /MT /Fe:LockScreen.exe ultra_fast_locker.cpp user32.lib gdi32.lib shell32.lib ole32.lib gdiplus.lib winmm.lib shlwapi.lib uuid.lib
    
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: LockScreen
        path: LockScreen.exe
